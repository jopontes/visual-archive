<head>

  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary":          "#a78bfa",
            "background-dark":  "#050509",
          },
          fontFamily: {
            "display": ["Inter", "sans-serif"],
            "syne":    ["Syne", "sans-serif"],
          },
          borderRadius: {
            "DEFAULT": "0.125rem",
            "lg":      "0.25rem",
            "xl":      "0.5rem",

  <style>
    /* ── Scrollbar hidden ──────────────────────── */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* ── List item (compact) ────────────────────── */
    .ref-item { transition: border-color 0.2s ease, color 0.2s ease; }
    .ref-item.active h2 { color: #fff; }
    .ref-item.active { border-left-color: rgba(167,139,250,0.45); }

    /* ── Mini card (filtered grid mode) ─────────── */
    .mini-card {
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 2px;
      padding: 0.75rem 0.85rem;
      transition: border-color 0.18s, background 0.18s;
    }
    .mini-card:hover {
      border-color: rgba(167,139,250,0.25);
      background: rgba(167,139,250,0.04);
    }
    .mini-card.active {
      border-color: rgba(167,139,250,0.45);
      background: rgba(167,139,250,0.07);
    }
    .mini-card.active .mc-name { color: #fff; }

    /* ── Card grid entrance ─────────────────────── */
    @keyframes gridIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-grid { animation: gridIn 0.22s ease both; }

    /* ── Right pane entrance ───────────────────── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .detail-fade { animation: fadeIn 0.28s ease both; }

    /* ── Tag chips ─────────────────────────────── */
    .tag-chip {
      display: inline-block;
      padding: 0.2rem 0.65rem;
      border: 1px solid rgba(167,139,250,0.2);
      border-radius: 2px;
      font-size: 0.67rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(167,139,250,0.6);
      cursor: pointer;
      transition: all 0.18s;
    }
    .tag-chip:hover, .tag-chip.active {
      border-color: rgba(167,139,250,0.7);
      color: #a78bfa;
      background: rgba(167,139,250,0.07);
    }
    .tag-chip.active {
      color: #fff;
      background: rgba(167,139,250,0.14);
    }

    /* ── Kbd hint ──────────────────────────────── */
    kbd {
      font-size: 0.6rem;
      padding: 0.1rem 0.4rem;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 2px;
      color: rgba(255,255,255,0.25);
    }
  </style>
</head>

  </div>
</div>

];

const REFS = RAW.map(([name,url,desc,tags],i)=>({
  id: i,
  name, url, desc,
  tags: tags ? tags.split(',').map(t=>t.trim()) : []
}));

// ─── TAG SET ──────────────────────────────────────
const tagSet = new Set();
REFS.forEach(r=>r.tags.forEach(t=>tagSet.add(t)));
const ALL_TAGS = [...tagSet].sort();

// ─── STATE ────────────────────────────────────────
let activeTag = null, query = '', activeIdx = 0;
let visibleRefs = [];

// ─── ELEMENTS ─────────────────────────────────────
const refList   = document.getElementById('ref-list');
const detail    = document.getElementById('detail');
const countEl   = document.getElementById('count');
const searchEl  = document.getElementById('search');
const clearBtn  = document.getElementById('clear-btn');
const clearFilt = document.getElementById('clear-filter-btn');
const filterRow = document.getElementById('filter-row');

// ─── FILTER TAGS RENDER ───────────────────────────
function renderFilterRow(){
  filterRow.innerHTML = '';
  ALL_TAGS.forEach(tag=>{
    const c = document.createElement('button');
    c.className = 'tag-chip' + (activeTag===tag ? ' active' : '');
    c.textContent = tag;
    c.onclick = ()=>{ activeTag = activeTag===tag ? null : tag; activeIdx=0; renderAll(); };
    filterRow.appendChild(c);
  });
}

// ─── FILTERED RESULT ──────────────────────────────
function filtered(){
  const q = query.toLowerCase();
  return REFS.filter(r=>{
    const mTag = !activeTag || r.tags.includes(activeTag);
    const mQ   = !q || r.name.toLowerCase().includes(q)
                     || r.desc.toLowerCase().includes(q)
                     || r.tags.some(t=>t.toLowerCase().includes(q));
    return mTag && mQ;
  });
}

// ─── DOMAIN HELPER ───────────────────────────────
function domain(url){
  try { return new URL(url).hostname.replace('www.',''); } catch { return url; }
}

// ─── LEFT LIST / CARD GRID ────────────────────────
function renderList(){
  refList.innerHTML = '';
  const isFiltered = !!(query || activeTag);

  if(isFiltered && visibleRefs.length > 0){
    // ── CARD GRID MODE (when filtered) ──────────────
    refList.className = 'card-grid grid grid-cols-2 gap-1.5 px-4';
    visibleRefs.forEach((r,i)=>{
      const div = document.createElement('div');
      div.className = 'mini-card' + (i===activeIdx ? ' active' : '');
      div.innerHTML = `
        <p class="mc-name font-syne text-[0.7rem] font-medium leading-tight tracking-tight
                  ${i===activeIdx ? 'text-white' : 'text-white/40'}
                  transition-colors duration-150 line-clamp-2">${r.name}</p>
        <p class="text-[9px] font-display mt-1.5 uppercase tracking-widest text-white/20 truncate">${r.tags[0] || ''}</p>
      `;
      div.onclick = ()=>{ activeIdx = i; renderAll(); };
      refList.appendChild(div);
    });
  } else {
    // ── COMPACT LIST MODE (default) ──────────────────
    refList.className = 'flex flex-col px-5';
    visibleRefs.forEach((r,i)=>{
      const div = document.createElement('div');
      div.className = 'ref-item group relative cursor-pointer py-2 pl-4 border-l border-transparent'
                    + (i===activeIdx ? ' active' : '');
      div.innerHTML = `
        <h2 class="font-syne text-sm font-medium leading-snug tracking-tight
                   ${i===activeIdx ? 'text-white' : 'text-white/45 group-hover:text-white/80'}
                   transition-colors duration-150">${r.name}</h2>
        <p class="text-[9px] font-display mt-0.5 uppercase tracking-widest
                  ${i===activeIdx ? 'text-primary/55' : 'text-transparent group-hover:text-white/22'}
                  transition-colors duration-150">${r.tags[0] || ''}</p>
      `;
      div.onclick = ()=>{ activeIdx = i; renderAll(); };
      refList.appendChild(div);
    });
  }
}

// ─── RIGHT DETAIL ────────────────────────────────
function renderDetail(){
  const r = visibleRefs[activeIdx];
  if(!r){ detail.innerHTML=''; return; }
  const idx   = (activeIdx+1).toString().padStart(3,'0');
  const dom   = domain(r.url);
  detail.innerHTML = `
    <div class="detail-fade">
      <div class="mb-10 flex items-center gap-4">
        <span class="text-[10px] font-syne text-primary/60 tracking-widest uppercase">Ref. ${idx}</span>
        <div class="h-px w-10 bg-primary/25"></div>
        <span class="text-[10px] font-syne text-white/30 tracking-widest uppercase">${dom}</span>
      </div>

      <h1 class="font-syne text-5xl xl:text-6xl leading-[0.92] font-light text-white tracking-tighter mb-12">
        ${r.name}
      </h1>

      <div class="grid grid-cols-2 gap-16">
        <div>
          <p class="font-display font-light text-base text-white/45 leading-relaxed mb-8">
            ${r.desc || ''}
          </p>
          <a href="${r.url}" target="_blank" rel="noopener noreferrer"
             class="inline-flex items-center gap-2 text-primary hover:text-white font-syne
                    transition-colors duration-300 group text-sm">
            <span class="tracking-wide uppercase">Visit archive</span>
            <span class="material-symbols-outlined text-sm transform group-hover:translate-x-1 transition-transform duration-300"
                  style="font-variation-settings:'wght' 300">arrow_forward</span>
          </a>
        </div>
        <div class="space-y-7">
          <div>
            <h3 class="text-[9px] font-syne text-white/25 uppercase tracking-widest mb-2">Categories</h3>
            <div class="flex flex-wrap gap-1.5">
              ${r.tags.map(t=>`<span class="tag-chip ${activeTag===t?'active':''}"
                onclick="setTag('${t}')">${t}</span>`).join('')}
            </div>
          </div>
          <div>
            <h3 class="text-[9px] font-syne text-white/25 uppercase tracking-widest mb-2">Source</h3>
            <p class="font-display text-white/55 text-sm">${dom}</p>
          </div>
          <div>
            <h3 class="text-[9px] font-syne text-white/25 uppercase tracking-widest mb-2">Index</h3>
            <p class="font-display text-white/55 text-sm">${idx} / ${REFS.length.toString().padStart(3,'0')}</p>
          </div>
        </div>
      </div>
    </div>
  `;
}
// expose tag click from detail panel
window.setTag = t=>{ activeTag = activeTag===t ? null : t; activeIdx=0; renderAll(); };

// ─── SCROLL ACTIVE INTO VIEW ──────────────────────
function scrollActiveIntoView(){
  const items = refList.querySelectorAll('.ref-item, .mini-card');
  if(items[activeIdx]){
    items[activeIdx].scrollIntoView({ block:'nearest', behavior:'smooth' });
  }
}

// ─── FULL RENDER ─────────────────────────────────
function renderAll(){
  visibleRefs = filtered();
  if(activeIdx >= visibleRefs.length) activeIdx = 0;

  renderFilterRow();
  renderList();
  renderDetail();

  const total = REFS.length;
  countEl.textContent = visibleRefs.length === total
    ? `${total} archives`
    : `${visibleRefs.length} of ${total}`;

  const hasFilters = !!query || !!activeTag;
  clearBtn.classList.toggle('hidden', !query);
  clearFilt.classList.toggle('hidden', !hasFilters);

  scrollActiveIntoView();
}

// ─── SEARCH ──────────────────────────────────────
searchEl.addEventListener('input', e=>{ query=e.target.value; activeIdx=0; renderAll(); });
clearBtn.addEventListener('click', ()=>{ query=''; activeIdx=0; searchEl.value=''; renderAll(); });
clearFilt.addEventListener('click', ()=>{ query=''; activeTag=null; activeIdx=0; searchEl.value=''; renderAll(); });

// ─── KEYBOARD NAV ────────────────────────────────
document.addEventListener('keydown', e=>{
  const key = e.key;
  if(key === '/' && document.activeElement !== searchEl){
    e.preventDefault(); searchEl.focus(); return;
  }
  if(key === 'ArrowDown'){
    e.preventDefault(); activeIdx = Math.min(activeIdx+1, visibleRefs.length-1); renderAll();
  } else if(key === 'ArrowUp'){
    e.preventDefault(); activeIdx = Math.max(activeIdx-1, 0); renderAll();
  } else if(key === 'Enter' && visibleRefs[activeIdx]){
    window.open(visibleRefs[activeIdx].url, '_blank');
  } else if(key === 'Escape'){
    if(document.activeElement === searchEl){ searchEl.blur(); }
    else { query=''; activeTag=null; activeIdx=0; searchEl.value=''; renderAll(); }
  }
});

// ─── INIT ────────────────────────────────────────
renderAll();
</script>
</body>
</html>
