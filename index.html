  <meta name="description" content="143 curated visual archives for the discerning creative eye."/>

  <script id="tailwind-config">

      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary":         "#a78bfa",
            "background-dark": "#050509",
          },
          fontFamily: {
            "display": ["Inter", "sans-serif"],

  <style>
    /* ── Reset/base ──────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* ── Card ────────────────────────────────── */
    .archive-card {
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 3px;
      background: rgba(255,255,255,0.025);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .archive-card:hover {
      border-color: rgba(167,139,250,0.3);
      background: rgba(167,139,250,0.04);
    }
    .archive-card.expanded {
      border-color: rgba(167,139,250,0.5);
      background: rgba(167,139,250,0.06);
    }

    /* ── Detail expand panel ─────────────────── */
    .detail-panel {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                  opacity 0.25s ease;
      opacity: 0;
    }
    .detail-panel.open {
      max-height: 300px;
      opacity: 1;
    }

    /* ── List row ────────────────────────────── */
    .list-row {
      border-bottom: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
      transition: background 0.15s;
    }
    .list-row:hover { background: rgba(167,139,250,0.04); }
    .list-row.expanded { background: rgba(167,139,250,0.06); }

    /* ── Tag chip ────────────────────────────── */
    .tag-chip {
      display: inline-block;
      padding: 0.15rem 0.55rem;
      border: 1px solid rgba(167,139,250,0.2);
      border-radius: 2px;
      font-size: 0.65rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: rgba(167,139,250,0.65);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .tag-chip:hover, .tag-chip.active {
      border-color: rgba(167,139,250,0.6);
      color: #a78bfa;
      background: rgba(167,139,250,0.08);
    }
    .tag-chip.active {
      color: #fff;
      background: rgba(167,139,250,0.16);
    }

    /* ── Chevron spin ──────────────────────── */
    .chevron { transition: transform 0.25s ease; }
    .expanded .chevron { transform: rotate(180deg); }

    /* ── Line clamp ──────────────────────────── */
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Fade in entrance ──────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.22s ease both; }

    /* ── Kbd ─────────────────────────────────── */
    kbd {
      font-size: 0.58rem;
      padding: 0.1rem 0.35rem;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 2px;
      color: rgba(255,255,255,0.25);
    }
  </style>
</head>

</header>

<!-- ── MAIN CONTENT ──────────────────────────────────────────── -->

];

const REFS = RAW.map(([name,url,desc,tags],i)=>({
  id: i, name, url, desc,
  tags: tags ? tags.split(',').map(t=>t.trim()) : []
}));

// ─── TAGS ────────────────────────────────────────────────────
const tagSet = new Set();
REFS.forEach(r=>r.tags.forEach(t=>tagSet.add(t)));
const ALL_TAGS = [...tagSet].sort();

// ─── STATE ───────────────────────────────────────────────────
let activeTag = null, query = '', view = 'grid', expandedId = null;
let visibleRefs = [];

// ─── ELEMENTS ───────────────────────────────────────────────
const container   = document.getElementById('refs-container');
const emptyState  = document.getElementById('empty-state');
const countEl     = document.getElementById('count');
const searchEl    = document.getElementById('search');
const clearBtn    = document.getElementById('clear-btn');
const filterRow   = document.getElementById('filter-row');

// ─── HELPERS ─────────────────────────────────────────────────
function domain(url){
  try { return new URL(url).hostname.replace('www.',''); } catch { return url; }
}
function filtered(){
  const q = query.toLowerCase();
  return REFS.filter(r=>{
    const mTag = !activeTag || r.tags.includes(activeTag);
    const mQ   = !q || r.name.toLowerCase().includes(q)
                     || r.desc.toLowerCase().includes(q)
                     || r.tags.some(t=>t.toLowerCase().includes(q));
    return mTag && mQ;
  });
}

// ─── VIEW TOGGLE ─────────────────────────────────────────────
window.setView = function(v){
  view = v;
  expandedId = null;
  localStorage.setItem('va-view', v);
  updateViewBtns();
  renderRefs();
};
function updateViewBtns(){
  document.getElementById('btn-grid').className =
    `view-btn px-2 py-1.5 transition-colors duration-150 cursor-pointer ${view==='grid' ? 'text-white' : 'text-white/30 hover:text-white/60'}`;
  document.getElementById('btn-list').className =
    `view-btn px-2 py-1.5 transition-colors duration-150 cursor-pointer ${view==='list' ? 'text-white' : 'text-white/30 hover:text-white/60'}`;
}

// ─── EXPAND TOGGLE ───────────────────────────────────────────
window.toggleExpand = function(id, e){
  e.stopPropagation();
  expandedId = expandedId === id ? null : id;
  // Update DOM without full re-render for snappy feel
  document.querySelectorAll('[data-ref-id]').forEach(el=>{
    const elId = parseInt(el.dataset.refId);
    const panel = el.querySelector('.detail-panel');
    const isExp = elId === expandedId;
    el.classList.toggle('expanded', isExp);
    if(panel){
      panel.classList.toggle('open', isExp);
    }
  });
};

// ─── DETAIL PANEL HTML ───────────────────────────────────────
function detailHTML(r){
  return `
    <div class="detail-panel ${expandedId===r.id ? 'open' : ''}">
      <div class="pt-3 pb-4 px-0 border-t border-white/[0.06] mt-3">
        <p class="text-sm text-white/70 leading-relaxed mb-4">${r.desc}</p>
        <div class="flex items-center justify-between flex-wrap gap-3">
          <div class="flex flex-wrap gap-1.5">
            ${r.tags.map(t=>`<span class="tag-chip ${activeTag===t?'active':''}"
              onclick="event.stopPropagation();window.setTagFilter('${t}')">${t}</span>`).join('')}
          </div>
          <a href="${r.url}" target="_blank" rel="noopener noreferrer"
             class="inline-flex items-center gap-1.5 text-primary hover:text-white text-xs font-syne
                    uppercase tracking-wider transition-colors duration-200 group cursor-pointer"
             onclick="event.stopPropagation()">
            <span>Visit archive</span>
            <span class="material-symbols-outlined text-sm transform group-hover:translate-x-0.5 transition-transform"
                  style="font-variation-settings:'wght' 300;font-size:14px">arrow_forward</span>
          </a>
        </div>
      </div>
    </div>
  `;
}

// ─── RENDER: GRID ─────────────────────────────────────────────
function renderGrid(){
  container.className = 'grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-3 fade-up';
  container.innerHTML = visibleRefs.map(r=>`
    <div class="archive-card p-4 ${expandedId===r.id?'expanded':''}"
         data-ref-id="${r.id}"
         onclick="toggleExpand(${r.id}, event)">
      <div class="flex items-start justify-between gap-2 mb-2">
        <h2 class="font-syne text-sm font-semibold text-white/90 leading-snug tracking-tight flex-1">${r.name}</h2>
        <span class="material-symbols-outlined chevron shrink-0 text-white/30 mt-0.5 select-none"
              style="font-variation-settings:'wght' 300;font-size:16px">expand_more</span>
      </div>
      <p class="text-[11px] text-white/50 leading-relaxed line-clamp-2 mb-3">${r.desc}</p>
      <div class="flex flex-wrap gap-1">
        ${r.tags.slice(0,2).map(t=>`<span class="tag-chip ${activeTag===t?'active':''}"
          onclick="event.stopPropagation();window.setTagFilter('${t}')">${t}</span>`).join('')}
      </div>
      ${detailHTML(r)}
    </div>
  `).join('');
}

// ─── RENDER: LIST ─────────────────────────────────────────────
function renderList(){
  container.className = 'flex flex-col fade-up';
  container.innerHTML = visibleRefs.map(r=>`
    <div class="list-row px-4 py-3 ${expandedId===r.id?'expanded':''}"
         data-ref-id="${r.id}"
         onclick="toggleExpand(${r.id}, event)">
      <div class="flex items-center gap-4 min-w-0">
        <h2 class="font-syne text-sm font-semibold text-white/90 tracking-tight w-64 shrink-0 truncate">${r.name}</h2>
        <div class="flex flex-wrap gap-1.5 flex-1 min-w-0">
          ${r.tags.map(t=>`<span class="tag-chip ${activeTag===t?'active':''}"
            onclick="event.stopPropagation();window.setTagFilter('${t}')">${t}</span>`).join('')}
        </div>
        <span class="text-[11px] text-white/30 font-display truncate shrink-0 hidden lg:block">${domain(r.url)}</span>
        <span class="material-symbols-outlined chevron text-white/25 shrink-0 select-none"
              style="font-variation-settings:'wght' 300;font-size:16px">expand_more</span>
      </div>
      ${detailHTML(r)}
    </div>
  `).join('');
}

// ─── RENDER: FILTER ROW ──────────────────────────────────────
function renderFilterRow(){
  filterRow.innerHTML =
    `<button class="tag-chip ${!activeTag?'active':''}" onclick="window.setTagFilter(null)">All</button>` +
    ALL_TAGS.map(tag=>`
      <button class="tag-chip ${activeTag===tag?'active':''}" onclick="window.setTagFilter('${tag}')">${tag}</button>
    `).join('');
}

// ─── MAIN RENDER ─────────────────────────────────────────────
function renderRefs(){
  visibleRefs = filtered();
  renderFilterRow();

  const total = REFS.length;
  countEl.textContent = visibleRefs.length === total
    ? `${total} archives`
    : `${visibleRefs.length} / ${total}`;

  clearBtn.classList.toggle('hidden', !query);
  emptyState.classList.toggle('hidden', visibleRefs.length > 0);
  emptyState.classList.toggle('flex', visibleRefs.length === 0);
  container.classList.toggle('hidden', visibleRefs.length === 0);

  if(visibleRefs.length === 0) return;
  view === 'grid' ? renderGrid() : renderList();
  updateViewBtns();
}

// ─── GLOBAL HELPERS ──────────────────────────────────────────
window.setTagFilter = function(tag){
  activeTag = tag;
  expandedId = null;
  renderRefs();
};
window.clearAll = function(){
  activeTag = null; query = ''; expandedId = null;
  searchEl.value = '';
  renderRefs();
};

// ─── EVENTS ──────────────────────────────────────────────────
searchEl.addEventListener('input', e=>{
  query = e.target.value;
  expandedId = null;
  renderRefs();
});
clearBtn.addEventListener('click', ()=>{
  query = ''; searchEl.value = ''; expandedId = null; renderRefs();
});
document.addEventListener('keydown', e=>{
  if(e.key === '/' && document.activeElement !== searchEl){
    e.preventDefault(); searchEl.focus();
  } else if(e.key === 'Escape'){
    if(document.activeElement === searchEl){ searchEl.blur(); }
    else { window.clearAll(); }
  }
});

// ─── INIT ────────────────────────────────────────────────────
const savedView = localStorage.getItem('va-view');
if(savedView === 'list' || savedView === 'grid') view = savedView;
renderRefs();
</script>
</body>
</html>
